<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>THY Route — Mobil Uygulama Prototip</title>
  <link rel="icon" href="assets/thy-favicon.svg" />

  <!-- Design system tokens + styles -->
  <link rel="stylesheet" href="_ds/thy-route-design-system-cb84b40a-0886-4a5a-97dc-fa17464b32b2/tokens/fonts.css" />

  <!-- B-group screens use their own aesthetics, mixed in -->

  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;0,900;1,500&family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=Space+Grotesk:wght@400;500;600;700&family=DM+Mono:wght@400;500&family=Bebas+Neue&display=swap" rel="stylesheet" />

  <style>
    html, body { margin: 0; padding: 0; background: #EEF1F5; font-family: var(--font-ui); color: var(--text-on-light); }
    body { min-height: 100vh; }
    * { box-sizing: border-box; }

    /* Toast animation */
    @keyframes toast-pop {
      from { opacity: 0; transform: translateY(8px) scale(0.95); }
      to   { opacity: 1; transform: none; }
    }
    .toast-pop { animation: toast-pop 260ms cubic-bezier(.16,1,.3,1); }
    @keyframes thyDotBlink { 0%,100% { opacity: 1 } 50% { opacity: 0.3 } }

    /* Page background — subtle navy gradient with route map watermark */
    .stage {
      min-height: 100vh;
      background:
        radial-gradient(120% 80% at 20% 0%, rgba(0,83,165,0.10) 0%, transparent 55%),
        radial-gradient(80% 60% at 90% 100%, rgba(183,49,44,0.07) 0%, transparent 60%),
        #EEF1F5;
      padding: 28px 32px 64px;
    }

    /* Toolbar */
    .toolbar {
      display: flex; align-items: center; gap: 18px; flex-wrap: wrap;
      padding: 14px 18px; margin-bottom: 22px;
      background: #fff; border: 1px solid var(--border-light);
      border-radius: var(--radius-lg); box-shadow: 0 6px 24px rgba(10,22,40,0.06);
    }
    .toolbar-brand {
      display: flex; align-items: center; gap: 10px;
      padding-right: 16px; border-right: 1px solid var(--border-light);
    }
    .toolbar-brand img { width: 28px; height: 28px; }
    .toolbar-brand-title {
      font-family: var(--font-heading); font-weight: 800;
      font-size: 14px; letter-spacing: 1.2px; color: var(--thy-navy);
    }
    .toolbar-brand-sub {
      font-family: var(--font-mono); font-size: 9px; letter-spacing: 1.5px;
      text-transform: uppercase; color: var(--text-on-light-muted);
    }
    .toolbar-screens {
      display: flex; gap: 6px; flex-wrap: wrap; flex: 1; min-width: 0;
    }
    .screen-chip {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 8px 12px; font-size: 11px; font-weight: 700;
      font-family: var(--font-ui); letter-spacing: 0.3px;
      background: #F3F5F8; color: var(--text-on-light-muted);
      border: 1px solid transparent; border-radius: 999px;
      cursor: pointer; transition: all 180ms cubic-bezier(.4,0,.2,1);
      white-space: nowrap;
    }
    .screen-chip:hover { background: #EBF1F9; color: var(--thy-navy); }
    .screen-chip.is-active {
      background: var(--thy-navy); color: #fff;
      border-color: var(--thy-navy);
      box-shadow: 0 6px 16px rgba(10,22,40,0.25);
    }
    .screen-chip .num {
      font-family: var(--font-mono); font-size: 9px; opacity: 0.6;
    }
    .screen-chip.is-active .num { opacity: 0.7; }

    /* Device pair stage */
    .devices {
      display: flex; gap: 56px; align-items: flex-start; justify-content: center;
      padding: 28px 0 8px; flex-wrap: wrap;
    }
    .device-frame {
      display: flex; flex-direction: column; align-items: center; gap: 14px;
    }
    .device-label {
      font-family: var(--font-mono); font-size: 10px; letter-spacing: 2px;
      text-transform: uppercase; color: var(--text-on-light-muted);
      padding: 6px 12px; background: #fff; border: 1px solid var(--border-light);
      border-radius: 999px;
    }

    /* Screen meta panel */
    .meta {
      max-width: 720px; margin: 36px auto 0;
      padding: 22px 26px; background: #fff;
      border: 1px solid var(--border-light); border-radius: var(--radius-lg);
      box-shadow: 0 8px 28px rgba(10,22,40,0.06);
    }
    .meta-eyebrow {
      font-family: var(--font-mono); font-size: 10px; letter-spacing: 2.5px;
      text-transform: uppercase; color: var(--thy-red);
      margin-bottom: 8px;
    }
    .meta-title {
      font-family: var(--font-heading); font-weight: 800;
      font-size: 22px; color: var(--thy-navy); margin: 0 0 8px;
      letter-spacing: -0.3px;
    }
    .meta-desc {
      font-size: 14px; line-height: 1.6; color: var(--text-on-light-muted);
      margin: 0;
    }

    /* Inside-phone shared: prevent global font from breaking iOS frame typography */
    .thy-screen { font-family: var(--font-ui); color: var(--thy-navy); overflow-x: hidden; }
    .thy-screen.is-dark { color: #fff; }
    /* Hide horizontal scrollbars inside horizontal carousels */
    .thy-screen ::-webkit-scrollbar { display: none; }
    .thy-screen * { scrollbar-width: none; }

    /* Screen transition */
    @keyframes thy-fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: none; }
    }
    .screen-enter { animation: thy-fadeUp 380ms cubic-bezier(.16,1,.3,1); }

    /* Plane glide along boarding pass / route */
    @keyframes thy-plane {
      0%,100% { left: 6%; opacity: .6 }
      50% { left: 86%; opacity: 1 }
    }

    /* Pulse for live status dot */
    @keyframes thy-pulse {
      0%,100% { box-shadow: 0 0 0 0 rgba(34,197,94,0.5); }
      50% { box-shadow: 0 0 0 6px rgba(34,197,94,0); }
    }
    @keyframes nfcRing {
      0%   { transform: scale(0.6); opacity: 0.6; }
      100% { transform: scale(1.6); opacity: 0; }
    }

    /* Shimmer for boarding pass QR area */
    @keyframes thy-shimmer {
      0% { background-position: -200% 0; }
      100% { background-position: 200% 0; }
    }

    /* Subtle floating clouds in splash */
    @keyframes thy-drift {
      from { transform: translateX(-10%); }
      to   { transform: translateX(10%); }
    }
  </style>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<body>
  <div id="root"></div>
<script>
(async () => {
  // Prepend so page-supplied @page / break rules (deck-stage's margin:0,
  // author CSS) keep source-order precedence over the baseline.
  const baseCss = document.createElement('style');
  baseCss.textContent = "@media print {\n  @page { margin: 0.5cm; }\n  html, body { print-color-adjust: exact; -webkit-print-color-adjust: exact; }\n  section, article, figure, table { break-inside: avoid; }\n  *, *::before, *::after {\n    animation-delay: -99s !important; animation-duration: .001s !important;\n    animation-iteration-count: 1 !important; animation-fill-mode: both !important;\n    animation-play-state: running !important; transition-duration: 0s !important;\n  }\n}";
  document.head.prepend(baseCss);
  if (document.readyState === 'loading') {
    await new Promise((r) => document.addEventListener('DOMContentLoaded', r, { once: true }));
  }
  let ds = document.querySelector('deck-stage');
  // whenDefined never resolves when nothing registers the element, so only
  // await it when a <deck-stage> tag exists (and race a timeout regardless).
  if (ds && !customElements.get('deck-stage')) {
    try {
      await Promise.race([
        customElements.whenDefined('deck-stage'),
        new Promise((r) => setTimeout(r, 3000)),
      ]);
    } catch (e) {}
    ds = document.querySelector('deck-stage');
  }
  // dc-runtime assigns window.DCLogic at init and mounts into #dc-root on
  // DOMContentLoaded; settle on that subtree so React has rendered before
  // print(). Non-DC pages fall through to weighing body.
  const isDc = !ds && 'DCLogic' in window;
  const settleRoot = ds || (isDc ? document.getElementById('dc-root') : null) || document.body;
  if (settleRoot) {
    // Weigh only content children — skip script/style/template so inline
    // Babel/CSS doesn't register as stable "content" before the framework
    // has mounted anything.
    const MEDIA = 'img,svg,canvas,video,picture,iframe,embed,object';
    const weigh = () => {
      let text = 0, media = 0;
      for (const c of settleRoot.children) {
        const t = c.tagName;
        if (t === 'SCRIPT' || t === 'STYLE' || t === 'TEMPLATE') continue;
        text += (c.textContent || '').trim().length;
        media += c.querySelectorAll(MEDIA).length + (c.matches(MEDIA) ? 1 : 0);
      }
      return text + media * 100;
    };
    // "Non-zero and stable" alone is not sufficient to mean rendered: generic
    // body can carry a static shell while async main content is pending, and
    // #dc-root can carry the root DC's static text while child refs are still
    // .sc-placeholder boxes. Gate generic on readyState 'complete', and never
    // accept stability while a dc-runtime placeholder is present.
    const isGeneric = settleRoot === document.body;
    const deadline = Date.now() + 15000;
    let last = -1, stable = 0;
    while (Date.now() < deadline) {
      const n = weigh();
      const ready =
        (!isGeneric || document.readyState === 'complete') &&
        !settleRoot.querySelector('.sc-placeholder');
      if (n > 0 && n === last && ready) { if (++stable >= 2) break; } else { stable = 0; }
      last = n;
      await new Promise((r) => setTimeout(r, 250));
    }
  }
  try { await document.fonts.ready; } catch (e) {}
  // Jump every animation to its end state so print() never captures a slide
  // mid-entrance. Ordering matters: the 0s-transition style must be live
  // BEFORE data-deck-active is set so attribute-keyed transitions don't
  // start a (now-0s) run from the pre-active base.
  const st = document.createElement('style');
  st.textContent = '*,*::before,*::after{animation-delay:-99s !important;animation-duration:.001s !important;animation-iteration-count:1 !important;animation-fill-mode:both !important;animation-play-state:running !important;transition-duration:0s !important}';
  document.head.appendChild(st);
  for (const d of document.querySelectorAll('deck-stage')) {
    for (const c of d.children) {
      const t = c.tagName;
      if (t === 'SCRIPT' || t === 'STYLE' || t === 'TEMPLATE') continue;
      c.setAttribute('data-deck-active', '');
    }
  }
  try {
    const sweep = () => {
      for (const a of document.getAnimations()) {
        try { a.finish(); } catch (e) {
          try { a.currentTime = (a.effect && a.effect.getComputedTiming().duration) || 0; a.pause(); } catch (e2) {}
        }
      }
    };
    sweep();
    await new Promise((r) => requestAnimationFrame(r));
    sweep();
    await new Promise((r) => requestAnimationFrame(r));
  } catch (e) {}
  setTimeout(() => { try { window.print(); } catch (e) {} }, 200);
})();
</script>
